# Terragrunt Boilerplate Configuration
variables:
  # Generic Boilerplate Variables Setup
  - name: is_hub
    order: 0
    description: "Is this a hub configuration?"
    type: bool
    default: false
    confirm: true
  - name: tags
    order: 1
    description: "Tags"
    type: map
    default: {}
    confirm: true
  # End - Generic Boilerplate Variables Setup
  - name: vpc_enabled
    order: 2
    description: "Is VPC Module Dependency Enabled?"
    type: bool
    default: true
    confirm: true
  - name: vpc_module_path
    order: 3
    description: "Path to VPC Module Dependency, required if vpc_enabled is true"
    type: string
    default: "../vpc"
    confirm: true
  - name: subnet_source
    order: 4
    description: "Source for subnets, either 'intra' or 'private', required if vpc_enabled is true"
    type: enum
    default: private
    options:
      - intra
      - private
    confirm: true

hooks:
  after:
    - command: "git"
      args: ["add", "."]
      dir: "{{ outputFolder }}"